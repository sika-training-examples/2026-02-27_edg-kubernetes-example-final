apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.4.5
      helm:
        valueFiles:
          - $values/clusters/egd_rke2/_system/argocd/argocd.values.yaml
    - repoURL: https://github.com/sika-training-examples/2026-02-27_edg-kubernetes-example-final.git
      ref: values
    - repoURL: https://github.com/sika-training-examples/2026-02-27_edg-kubernetes-example-final.git
      path: ./clusters/egd_rke2/_system/argocd/manifests
