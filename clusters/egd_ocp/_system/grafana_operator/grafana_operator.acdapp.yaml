apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-95"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: system
  destination:
    namespace: grafana
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://github.com/sika-training-examples/2026-02-27_edg-kubernetes-example-final.git
      path: ./clusters/egd_ocp/_system/grafana_operator/manifests
