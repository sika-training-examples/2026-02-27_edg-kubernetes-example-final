apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-kafdrop
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  project: kafka-kafdrop
  destination:
    namespace: kafka
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/sikalabs/charts.git
      path: charts/simple-kafdrop
      helm:
        valuesObject:
          # https://github.com/sikalabs/charts/blob/master/charts/simple-kafdrop/values.yaml
          host: kafdrop.apps.egd.germanywestcentral.aroapp.io
          kafkaBootstrapServer: kafka-kafka-bootstrap.kafka.svc:9092
          ingressClassName: openshift-default
          tls: false
          ingressExtraAnnotations:
            route.openshift.io/termination: edge
            route.openshift.io/insecureEdgeTerminationPolicy: Redirect
    - repoURL: https://github.com/sika-training-examples/2026-02-27_edg-kubernetes-example-final.git
      path: ./clusters/egd_ocp/kafka_kafdrop/manifests
